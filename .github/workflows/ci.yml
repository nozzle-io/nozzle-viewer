name: CI

on:
  push:
    branches: [ main, stable ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, stable ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  build-macos:
    name: macOS
    runs-on: macos-14
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Verify universal binary
        run: |
          archs=$(lipo -archs build/nozzle-viewer.app/Contents/MacOS/nozzle-viewer)
          echo "$archs"
          echo "$archs" | grep -q "arm64" || { echo "Missing arm64 slice"; exit 1; }
          echo "$archs" | grep -q "x86_64" || { echo "Missing x86_64 slice"; exit 1; }
      - name: Codesign app
        run: codesign --force --deep --sign - build/nozzle-viewer.app
      - name: Prepare package metadata
        id: meta
        run: |
          repo="${{ github.event.repository.name }}"
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${repo}-${GITHUB_REF_NAME}-macos-universal"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${repo}-latest-${short_sha}-macos-universal"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${repo}-stable-${short_sha}-macos-universal"
          else
            base="${repo}-ci-${short_sha}-macos-universal"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"
      - name: Package macOS app
        run: |
          cd build
          zip -r "../${{ steps.meta.outputs.package_name }}" nozzle-viewer.app
      - name: Verify package
        run: |
          test -f "${{ steps.meta.outputs.package_name }}"
          unzip -l "${{ steps.meta.outputs.package_name }}" | grep -F 'nozzle-viewer.app/Contents/MacOS/nozzle-viewer'
          unzip -l "${{ steps.meta.outputs.package_name }}" | grep -F 'nozzle-viewer.app/Contents/Info.plist'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  build-windows:
    name: Windows
    runs-on: windows-latest
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Prepare package metadata
        id: meta
        shell: pwsh
        run: |
          $repo = "${{ github.event.repository.name }}"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $base = "$repo-${{ github.ref_name }}-windows-x64"
          } elseif ($env:GITHUB_REF -eq "refs/heads/main") {
            $base = "$repo-latest-$shortSha-windows-x64"
          } elseif ($env:GITHUB_REF -eq "refs/heads/stable") {
            $base = "$repo-stable-$shortSha-windows-x64"
          } else {
            $base = "$repo-ci-$shortSha-windows-x64"
          }
          "package_root=$base" >> $env:GITHUB_OUTPUT
          "package_name=$base.zip" >> $env:GITHUB_OUTPUT
      - name: Package Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item build/Release/nozzle-viewer.exe package/nozzle-viewer.exe
          Compress-Archive -Path package/nozzle-viewer.exe -DestinationPath "${{ steps.meta.outputs.package_name }}"
      - name: Verify package
        shell: pwsh
        run: |
          if (!(Test-Path "${{ steps.meta.outputs.package_name }}")) { exit 1 }
          Expand-Archive -Path "${{ steps.meta.outputs.package_name }}" -DestinationPath verify
          if (!(Test-Path verify/nozzle-viewer.exe)) { exit 1 }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Prepare package metadata
        id: meta
        run: |
          repo="${{ github.event.repository.name }}"
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${repo}-${GITHUB_REF_NAME}-linux-x64"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${repo}-latest-${short_sha}-linux-x64"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${repo}-stable-${short_sha}-linux-x64"
          else
            base="${repo}-ci-${short_sha}-linux-x64"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"
      - name: Package Linux executable
        run: |
          mkdir -p package
          cp build/nozzle-viewer package/nozzle-viewer
          chmod +x package/nozzle-viewer
          zip -j "${{ steps.meta.outputs.package_name }}" package/nozzle-viewer
      - name: Verify package
        run: |
          test -f "${{ steps.meta.outputs.package_name }}"
          unzip -l "${{ steps.meta.outputs.package_name }}" | grep -F 'nozzle-viewer'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}


  release:
    needs: [build-macos, build-windows, build-linux]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Move latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push origin refs/tags/latest --force

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.package_root }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.package_root }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-linux.outputs.package_root }}

      - name: Verify downloaded packages
        env:
          PACKAGE_MACOS: ${{ needs.build-macos.outputs.package_name }}
          PACKAGE_WINDOWS: ${{ needs.build-windows.outputs.package_name }}
          PACKAGE_LINUX: ${{ needs.build-linux.outputs.package_name }}
        run: |
          test -f "$PACKAGE_MACOS"
          test -f "$PACKAGE_WINDOWS"
          test -f "$PACKAGE_LINUX"

      - name: Generate checksums and manifest
        env:
          APP_ID: nozzle-viewer
          EXPECTED_PLATFORMS: "macos-universal windows-x64 linux-x64"
          PACKAGE_MACOS: ${{ needs.build-macos.outputs.package_name }}
          PACKAGE_WINDOWS: ${{ needs.build-windows.outputs.package_name }}
          PACKAGE_LINUX: ${{ needs.build-linux.outputs.package_name }}
        run: |
          packages=("$PACKAGE_MACOS" "$PACKAGE_WINDOWS" "$PACKAGE_LINUX")
          for package in "${packages[@]}"; do
            test -f "$package"
          done
          : > SHA256SUMS
          for package in "${packages[@]}"; do
            checksum=$(sha256sum "$package" | awk '{print $1}')
            printf '%s  %s\n' "$checksum" "$(basename "$package")" >> SHA256SUMS
          done
          python3 scripts/write-release-manifest.py --app-id "$APP_ID" --expected-platforms macos-universal windows-x64 linux-x64 --output manifest.json "${packages[@]}"
          cat SHA256SUMS
          cat manifest.json

      - name: Check versioned release asset does not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_MACOS: ${{ needs.build-macos.outputs.package_name }}
          PACKAGE_WINDOWS: ${{ needs.build-windows.outputs.package_name }}
          PACKAGE_LINUX: ${{ needs.build-linux.outputs.package_name }}
        run: |
          built_packages=("$PACKAGE_MACOS" "$PACKAGE_WINDOWS" "$PACKAGE_LINUX")
          packages=("${built_packages[@]}" SHA256SUMS manifest.json)
          release_tag="${GITHUB_REF_NAME}"
          if release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}" --jq .id 2>/dev/null); then
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --jq '.[].name' > existing-assets.txt
            for asset in "${packages[@]}"; do
              if grep -Fx "$asset" existing-assets.txt; then
                echo "versioned release asset already exists: $asset" >&2
                exit 1
              fi
            done
          else
            echo "No existing release for $release_tag; create step will create it."
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_MACOS: ${{ needs.build-macos.outputs.package_name }}
          PACKAGE_WINDOWS: ${{ needs.build-windows.outputs.package_name }}
          PACKAGE_LINUX: ${{ needs.build-linux.outputs.package_name }}
        run: |
          built_packages=("$PACKAGE_MACOS" "$PACKAGE_WINDOWS" "$PACKAGE_LINUX")
          assets=("${built_packages[@]}" SHA256SUMS manifest.json)
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            release_tag="latest"
            title="Latest development snapshot"
            notes="Mutable development snapshot from main. Commit: ${GITHUB_SHA}"
            if release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}" --jq .id 2>/dev/null); then
              gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets" --jq '.[].id' > release-asset-ids.txt
              while IFS= read -r asset_id; do
                if [ -n "$asset_id" ]; then
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
                fi
              done < release-asset-ids.txt
              gh release edit "$release_tag" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "$title" \
                --notes "$notes" \
                --prerelease
              gh release upload "$release_tag" "${assets[@]}" --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "$release_tag" "${assets[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --verify-tag \
                --title "$title" \
                --notes "$notes" \
                --prerelease
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${release_tag}" --jq .id >/dev/null 2>&1; then
              gh release upload "$release_tag" "${assets[@]}" --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "$release_tag" "${assets[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "$release_tag" \
                --notes "Release $release_tag"
            fi
          else
            echo "unsupported release ref: ${GITHUB_REF}" >&2
            exit 1
          fi
          echo "Release URL and uploaded assets:"
          gh release view "$release_tag" --repo "${GITHUB_REPOSITORY}" --json url,assets --jq '.url, (.assets[].name)'
