name: CI

on:
  push:
    branches: [ main, stable ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, stable ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  build-macos:
    name: macOS
    runs-on: macos-latest
    outputs:
      package_root: ${{ steps.meta.outputs.package_root }}
      package_name: ${{ steps.meta.outputs.package_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Codesign app
        run: codesign --force --deep --sign - build/nozzle-viewer.app
      - name: Prepare package metadata
        id: meta
        run: |
          repo="${{ github.event.repository.name }}"
          short_sha="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${repo}-${GITHUB_REF_NAME}-macos"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${repo}-latest-${short_sha}-macos"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${repo}-stable-${short_sha}-macos"
          else
            base="${repo}-ci-${short_sha}-macos"
          fi
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"
      - name: Package macOS app
        run: |
          cd build
          zip -r "../${{ steps.meta.outputs.package_name }}" nozzle-viewer.app
      - name: Verify package
        run: |
          test -f "${{ steps.meta.outputs.package_name }}"
          unzip -l "${{ steps.meta.outputs.package_name }}" | grep -F 'nozzle-viewer.app/Contents/MacOS/nozzle-viewer'
          unzip -l "${{ steps.meta.outputs.package_name }}" | grep -F 'nozzle-viewer.app/Contents/Info.plist'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure
        run: cmake -S . -B build -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxxf86vm-dev \
            libwayland-dev \
            wayland-protocols \
            libxkbcommon-dev \
            libegl-dev \
            libgbm-dev \
            libdrm-dev
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DNOZZLE_VIEWER_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release


  release:
    needs: [build-macos, build-windows, build-linux]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-macos.outputs.package_root }}
      - name: Verify downloaded package
        run: |
          test -f "${{ needs.build-macos.outputs.package_name }}"
          unzip -l "${{ needs.build-macos.outputs.package_name }}" | grep -F 'nozzle-viewer.app/Contents/MacOS/nozzle-viewer'
      - name: Delete old latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete latest --yes --repo "${GITHUB_REPOSITORY}"
          else
            echo "No existing latest release to delete"
          fi
      - name: Check versioned release asset does not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="${{ needs.build-macos.outputs.package_name }}"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' > existing-assets.txt 2>/dev/null; then
            if grep -Fx "$asset" existing-assets.txt; then
              echo "versioned release asset already exists: $asset" >&2
              exit 1
            fi
          else
            echo "No existing release for ${GITHUB_REF_NAME}; create step will create it."
          fi
      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package="${{ needs.build-macos.outputs.package_name }}"
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            gh release create latest "$package" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Latest development snapshot" \
              --prerelease \
              --notes "Development snapshot from main. Commit: ${GITHUB_SHA}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release upload "${GITHUB_REF_NAME}" "$package" --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "${GITHUB_REF_NAME}" "$package" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${GITHUB_REF_NAME}" \
                --notes "Release ${GITHUB_REF_NAME}"
            fi
          else
            echo "unsupported release ref: ${GITHUB_REF}" >&2
            exit 1
          fi
